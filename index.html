<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>hashcards</title>
  <link rel="stylesheet" href="vendor/katex/katex.min.css">
  <link rel="stylesheet" href="vendor/highlight/highlight.css">
  <script defer src="vendor/katex/katex.min.js"></script>
  <script defer src="vendor/katex/contrib/mhchem.min.js"></script>
  <script defer src="vendor/highlight/highlight.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    .card-content { opacity: 0; }
    noscript + .root .card-content { opacity: 1; }
    .controls form .deck-select { margin: 0 12px; min-width: 220px; }
    .controls form select, .controls form input[type="search"] {
      -webkit-appearance: none; appearance: none; background: white; border: 1px solid #999;
      padding: 7px 12px; font-size: 16px; color: black; font-family: system-ui, -apple-system, "Helvetica Neue", sans-serif;
      font-weight: 600; border-radius: 6px; box-shadow: #ccc 0px 1px 3px 0px;
    }
    .controls form input[type="search"] { min-width: 260px; }
    @media (prefers-color-scheme: dark) {
      .controls form select, .controls form input[type="search"] { background: #333; border-color: #555; color: #e0e0e0; box-shadow: #111 0px 1px 3px 0px; }
    }
  </style>
</head>
<body>
  <script>const MACROS = {};</script>
  <noscript><style>.card-content{opacity:1}</style></noscript>
  <div class="root">
    <div class="header">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="card-container">
      <div class="card">
        <div class="card-header"><h1 id="deckName">hashcards</h1></div>
        <div class="card-content" id="cardContent">
          <div class="question rich-text" id="question"></div>
          <div class="answer rich-text" id="answer"></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <form id="controls" action="/" method="post">
        <input id="undo" type="submit" name="action" value="Undo" title="Undo last action. Shortcut: u." disabled>
        <input id="search" type="search" placeholder="Search">
        <select id="deckFilter" class="deck-select"></select>
        <div class="spacer"></div>
        <input id="reveal" type="submit" name="action" value="Reveal" title="Show the answer. Shortcut: space.">
        <div class="grades" hidden>
          <input id="forgot" type="submit" name="action" value="Forgot" title="Shortcut: 1.">
          <input id="hard" type="submit" name="action" value="Hard" title="Shortcut: 2.">
          <input id="good" type="submit" name="action" value="Good" title="Shortcut: 3.">
          <input id="easy" type="submit" name="action" value="Easy" title="Shortcut: 4.">
        </div>
        <div class="spacer"></div>
        <input id="end" type="submit" name="action" value="End" title="End the session">
      </form>
    </div>
  </div>
  <script src="script.js"></script>
  <script src="app.js"></script>
</body>
</html>
