<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hashcards</title>
  <meta name="description" content="Minimalny interfejs do fiszek z funkcji zespolonych i statystyki.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
  <style>
    :root {
      --window: #efefef;
      --panel: #f7f7f7;
      --field: #ffffff;
      --text: #1f1f1f;
      --muted: #666666;
      --line: #c9c9c9;
      --line-dark: #9f9f9f;
      --blue: #2a6db3;
      --blue-soft: #d8e8f8;
      --shadow: 0 1px 2px rgba(0,0,0,.10);
      --font: "Segoe UI", "Noto Sans", Arial, sans-serif;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--window);
      color: var(--text);
      font: 13px/1.45 var(--font);
    }

    button, input, select { font: inherit; color: inherit; }
    button { cursor: default; }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
    }

    .menubar {
      height: 30px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 10px;
      border-bottom: 1px solid var(--line-dark);
      background: #f4f4f4;
      user-select: none;
    }
    .brand { font-weight: 600; }
    .menuitem { color: #333; }
    .menuitem.muted { color: var(--muted); margin-left: auto; }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 190px 250px auto auto;
      gap: 6px;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    input, select, .qt-button {
      height: 28px;
      border: 1px solid var(--line-dark);
      border-radius: 3px;
      background: var(--field);
      padding: 0 8px;
      outline: none;
      box-shadow: inset 0 1px 1px rgba(0,0,0,.04);
    }
    input:focus, select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 1px rgba(42,109,179,.18), inset 0 1px 1px rgba(0,0,0,.04);
    }
    .qt-button {
      min-width: 72px;
      background: linear-gradient(#ffffff, #e6e6e6);
      box-shadow: var(--shadow);
    }
    .qt-button:active { background: linear-gradient(#dcdcdc, #f4f4f4); box-shadow: inset 0 1px 2px rgba(0,0,0,.15); }
    .qt-button.primary { border-color: #7a9cc0; background: linear-gradient(#f9fcff, #dbeafa); }

    .main {
      min-height: 0;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 0;
      overflow: hidden;
    }

    .list-pane, .card-pane {
      min-height: 0;
      overflow: auto;
    }
    .list-pane {
      border-right: 1px solid var(--line-dark);
      background: #fafafa;
    }
    .card-pane {
      background: var(--window);
      padding: 12px;
    }

    .section-title {
      height: 26px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      border-bottom: 1px solid var(--line);
      background: #e9e9e9;
      color: #444;
      font-weight: 600;
    }

    .rows { list-style: none; margin: 0; padding: 0; }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 7px 8px;
      border-bottom: 1px solid #e4e4e4;
      background: #fff;
      text-align: left;
    }
    .row:hover { background: #f1f6fb; }
    .row.active { background: var(--blue-soft); outline: 1px solid #9dc3e6; outline-offset: -1px; }
    .row-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-topic { color: var(--muted); font-size: 11px; white-space: nowrap; }

    .card-window {
      max-width: 880px;
      min-height: 520px;
      margin: 0 auto;
      border: 1px solid var(--line-dark);
      background: var(--field);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .card-titlebar {
      min-height: 34px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-bottom: 1px solid var(--line);
      background: #f3f3f3;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      padding: 2px 7px;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: #fff;
      color: #444;
      font-size: 11px;
      white-space: nowrap;
    }
    .badge.topic { border-color: #9dc3e6; background: #eef6ff; }
    .badge.source { margin-left: auto; max-width: 260px; overflow: hidden; text-overflow: ellipsis; }

    .card-body {
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
    }
    .label {
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .question {
      font-size: 19px;
      line-height: 1.35;
      max-width: 70ch;
    }
    .answer-box {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }
    .answer {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 16px;
      max-width: 76ch;
    }
    .answer.hidden { display: none; }
    .placeholder {
      color: var(--muted);
      border: 1px dashed var(--line-dark);
      background: #fafafa;
      padding: 14px;
      width: fit-content;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 8px;
      border-top: 1px solid var(--line);
      background: #f7f7f7;
    }
    .spacer { flex: 1; }
    .statusbar {
      min-height: 24px;
      display: flex;
      gap: 16px;
      align-items: center;
      padding: 0 8px;
      border-top: 1px solid var(--line-dark);
      background: #f4f4f4;
      color: #555;
      font-size: 12px;
    }
    .kbd { font-family: var(--mono); color: #333; }
    .katex { font-size: 1.04em; }
    .katex-display { margin: .7em 0; overflow-x: auto; overflow-y: hidden; padding-bottom: 2px; }
    .row-title .katex { font-size: 1em; }

    @media (max-width: 820px) {
      .toolbar { grid-template-columns: 1fr; }
      .main { grid-template-columns: 1fr; grid-template-rows: minmax(180px, 38vh) 1fr; }
      .list-pane { border-right: 0; border-bottom: 1px solid var(--line-dark); }
      .card-pane { padding: 8px; }
      .card-window { min-height: 440px; }
      .badge.source { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="menubar">
      <span class="brand">Hashcards</span>
      <span class="menuitem">Fiszki</span>
      <span class="menuitem">Nauka</span>
      <span class="menuitem">Pomoc</span>
      <span class="menuitem muted" id="summary">Wczytywanie…</span>
    </header>

    <div class="toolbar">
      <input id="q" type="search" placeholder="Szukaj" autocomplete="off">
      <select id="topic"></select>
      <select id="deck"></select>
      <button class="qt-button primary" id="randomBtn">Losuj</button>
      <button class="qt-button" id="flipBtn">Pokaż</button>
    </div>

    <main class="main">
      <aside class="list-pane">
        <div class="section-title" id="resultInfo">Wyniki</div>
        <ul id="cards" class="rows"></ul>
      </aside>

      <section class="card-pane">
        <article class="card-window" aria-live="polite">
          <div class="card-titlebar" id="viewerMeta"></div>
          <div class="card-body">
            <div>
              <div class="label">Pytanie</div>
              <div class="question" id="viewerQuestion">Wczytywanie…</div>
            </div>
            <div class="answer-box">
              <div class="label">Odpowiedź</div>
              <div class="answer hidden" id="viewerAnswer"></div>
              <div class="placeholder" id="answerPlaceholder">Kliknij „Pokaż” albo naciśnij spację.</div>
            </div>
          </div>
          <div class="card-actions">
            <button class="qt-button" id="prevBtn">Poprzednia</button>
            <button class="qt-button" id="nextBtn">Następna</button>
            <button class="qt-button" id="copyBtn">Kopiuj Q/A</button>
            <span class="spacer"></span>
            <button class="qt-button primary" id="flipBtnBottom">Pokaż</button>
          </div>
        </article>
      </section>
    </main>

    <footer class="statusbar">
      <span id="statusCount">0 kart</span>
      <span>Skróty: <span class="kbd">/</span> szukaj, <span class="kbd">spacja</span> odpowiedź, <span class="kbd">←/→</span> nawigacja, <span class="kbd">r</span> losuj</span>
    </footer>
  </div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script>
const state = { cards: [], filtered: [], activeIndex: 0, showAnswer: false };
const els = {
  q: document.getElementById('q'),
  topic: document.getElementById('topic'),
  deck: document.getElementById('deck'),
  summary: document.getElementById('summary'),
  cards: document.getElementById('cards'),
  resultInfo: document.getElementById('resultInfo'),
  statusCount: document.getElementById('statusCount'),
  viewerMeta: document.getElementById('viewerMeta'),
  viewerQuestion: document.getElementById('viewerQuestion'),
  viewerAnswer: document.getElementById('viewerAnswer'),
  answerPlaceholder: document.getElementById('answerPlaceholder'),
  flipBtn: document.getElementById('flipBtn'),
  flipBtnBottom: document.getElementById('flipBtnBottom'),
  randomBtn: document.getElementById('randomBtn'),
  prevBtn: document.getElementById('prevBtn'),
  nextBtn: document.getElementById('nextBtn'),
  copyBtn: document.getElementById('copyBtn')
};

const escapeHTML = s => String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const normalize = s => String(s).toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu, '');

function renderMath(el) {
  if (!window.renderMathInElement || !el) return;
  renderMathInElement(el, {
    delimiters: [
      {left: '$$', right: '$$', display: true},
      {left: '\\[', right: '\\]', display: true},
      {left: '$', right: '$', display: false},
      {left: '\\(', right: '\\)', display: false}
    ],
    throwOnError: false,
    strict: 'ignore'
  });
}

function buildFilters() {
  const topics = ['Wszystkie', ...new Set(state.cards.map(c => c.topic))];
  const decks = ['Wszystkie działy', ...new Set(state.cards.map(c => c.deck))];
  els.topic.innerHTML = topics.map(t => `<option value="${escapeHTML(t)}">${escapeHTML(t)}</option>`).join('');
  els.deck.innerHTML = decks.map(t => `<option value="${escapeHTML(t)}">${escapeHTML(t)}</option>`).join('');
}

function updateSummary() {
  const byTopic = [...new Set(state.cards.map(c => c.topic))]
    .map(t => `${t}: ${state.cards.filter(c => c.topic === t).length}`)
    .join(' · ');
  els.summary.textContent = `${state.cards.length} kart · ${byTopic}`;
}

function getFiltered() {
  const q = normalize(els.q.value.trim());
  const topic = els.topic.value;
  const deck = els.deck.value;
  return state.cards.filter(c => {
    if (topic !== 'Wszystkie' && c.topic !== topic) return false;
    if (deck !== 'Wszystkie działy' && c.deck !== deck) return false;
    if (!q) return true;
    const hay = normalize([c.question, c.answer, c.deck, c.topic, c.source].join(' '));
    return q.split(/\s+/).every(token => hay.includes(token));
  });
}

function setActive(idx, reveal = false) {
  if (!state.filtered.length) return;
  state.activeIndex = (idx + state.filtered.length) % state.filtered.length;
  state.showAnswer = reveal;
  const card = state.filtered[state.activeIndex];
  const hash = `#${encodeURIComponent(card.id)}`;
  if (location.hash !== hash) history.replaceState(null, '', hash);
  renderViewer();
  renderList();
}

function renderViewer() {
  const card = state.filtered[state.activeIndex] || state.cards[0];
  if (!card) return;
  els.viewerMeta.innerHTML = `
    <span class="badge topic">${escapeHTML(card.topic)}</span>
    <span class="badge">${escapeHTML(card.deck)}</span>
    <span class="badge source">${escapeHTML(card.source)}</span>
  `;
  els.viewerQuestion.innerHTML = escapeHTML(card.question);
  els.viewerAnswer.innerHTML = escapeHTML(card.answer);
  renderMath(els.viewerQuestion);
  renderMath(els.viewerAnswer);
  els.viewerAnswer.classList.toggle('hidden', !state.showAnswer);
  els.answerPlaceholder.style.display = state.showAnswer ? 'none' : 'block';
  els.flipBtn.textContent = state.showAnswer ? 'Ukryj' : 'Pokaż';
  els.flipBtnBottom.textContent = state.showAnswer ? 'Ukryj' : 'Pokaż';
}

function renderList() {
  const items = state.filtered;
  els.resultInfo.textContent = items.length ? `Wyniki (${items.length}/${state.cards.length})` : 'Brak wyników';
  els.statusCount.textContent = items.length ? `${state.activeIndex + 1}/${items.length} · ${state.cards.length} kart` : `0/${state.cards.length} kart`;
  els.cards.innerHTML = '';
  if (!items.length) {
    const li = document.createElement('li');
    li.className = 'row';
    li.innerHTML = '<span class="row-title">Brak wyników</span><span class="row-topic">—</span>';
    els.cards.appendChild(li);
    return;
  }
  for (const [idx, card] of items.entries()) {
    const li = document.createElement('li');
    li.className = 'row' + (idx === state.activeIndex ? ' active' : '');
    li.innerHTML = `<span class="row-title">${escapeHTML(card.question)}</span><span class="row-topic">${escapeHTML(card.topic)}</span>`;
    renderMath(li.querySelector('.row-title'));
    li.addEventListener('click', () => setActive(idx, true));
    els.cards.appendChild(li);
  }
}

function applyFilters() {
  state.filtered = getFiltered();
  if (!state.filtered.length) {
    state.activeIndex = 0;
    state.showAnswer = false;
    els.viewerMeta.innerHTML = '';
    els.viewerQuestion.textContent = 'Brak wyników';
    els.viewerAnswer.textContent = '';
    els.viewerAnswer.classList.add('hidden');
    els.answerPlaceholder.style.display = 'block';
    renderList();
    return;
  }
  const currentId = location.hash ? decodeURIComponent(location.hash.slice(1)) : null;
  const hashIdx = currentId ? state.filtered.findIndex(c => c.id === currentId) : -1;
  state.activeIndex = hashIdx >= 0 ? hashIdx : Math.min(state.activeIndex, state.filtered.length - 1);
  state.showAnswer = false;
  renderViewer();
  renderList();
}

function toggleAnswer() {
  state.showAnswer = !state.showAnswer;
  renderViewer();
}

async function init() {
  const res = await fetch('cards.json');
  state.cards = await res.json();
  buildFilters();
  updateSummary();
  state.filtered = getFiltered();
  const hashId = location.hash ? decodeURIComponent(location.hash.slice(1)) : null;
  const idx = hashId ? state.filtered.findIndex(c => c.id === hashId) : -1;
  if (idx >= 0) state.activeIndex = idx;
  renderViewer();
  renderList();
}

els.q.addEventListener('input', applyFilters);
els.topic.addEventListener('change', applyFilters);
els.deck.addEventListener('change', applyFilters);
els.flipBtn.addEventListener('click', toggleAnswer);
els.flipBtnBottom.addEventListener('click', toggleAnswer);
els.randomBtn.addEventListener('click', () => {
  if (!state.filtered.length) return;
  setActive(Math.floor(Math.random() * state.filtered.length), true);
});
els.prevBtn.addEventListener('click', () => setActive(state.activeIndex - 1));
els.nextBtn.addEventListener('click', () => setActive(state.activeIndex + 1));
els.copyBtn.addEventListener('click', async () => {
  const card = state.filtered[state.activeIndex];
  if (!card) return;
  await navigator.clipboard.writeText(`Q: ${card.question}\nA: ${card.answer}`);
  els.copyBtn.textContent = 'Skopiowano';
  setTimeout(() => els.copyBtn.textContent = 'Kopiuj Q/A', 900);
});
window.addEventListener('keydown', e => {
  const typing = ['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement.tagName);
  if (e.key === '/' && document.activeElement !== els.q) { e.preventDefault(); els.q.focus(); }
  if (e.key === ' ' && !typing) { e.preventDefault(); toggleAnswer(); }
  if (e.key === 'ArrowLeft' && !typing) { e.preventDefault(); setActive(state.activeIndex - 1); }
  if (e.key === 'ArrowRight' && !typing) { e.preventDefault(); setActive(state.activeIndex + 1); }
  if (e.key.toLowerCase() === 'r' && !typing) { e.preventDefault(); els.randomBtn.click(); }
});
window.addEventListener('hashchange', () => {
  const id = location.hash ? decodeURIComponent(location.hash.slice(1)) : null;
  const idx = state.filtered.findIndex(c => c.id === id);
  if (idx >= 0) setActive(idx);
});
init().catch(err => {
  els.viewerQuestion.textContent = 'Nie udało się wczytać cards.json';
  els.viewerAnswer.textContent = String(err);
  els.viewerAnswer.classList.remove('hidden');
  els.answerPlaceholder.style.display = 'none';
  console.error(err);
});
</script>
</body>
</html>
